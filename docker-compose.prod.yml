# ── EchoB Production (Hetzner) ────────────────────────────────────────────
# Start:   docker compose -f docker-compose.prod.yml up -d --build
# Update:  git pull && docker compose -f docker-compose.prod.yml up -d --build
#
# Alle Secrets/Konfiguration kommen aus .env.docker (siehe .env.production.example).
# Unterschiede zur Dev-Compose:
#   - Postgres und API exponieren KEINE Host-Ports (nur Caddy: 80/443)
#   - kein Hot-Reload, kein Source-Mount, kein pgAdmin, kein static-site
#   - Caddy terminiert TLS für api.echo-b.de (Let's Encrypt automatisch)

name: echob

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.docker            # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker            # DATABASE_URL, Supabase, OpenAI, Stripe, …
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --proxy-headers
        --forwarded-allow-ips "*"
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # Zertifikate (bleiben über Neustarts erhalten)
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
